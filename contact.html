<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="utf-8" />
    <title>Contact — CSS Showcase</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self'">
    <link rel="stylesheet" type="text/css" media="screen" href="main.css" />
</head>

<body>
    <header>
        <nav>
            <ul>
                <li>
                    <a href="index.html">
                        <svg aria-hidden="true"><use href="icons.svg#icon-home"></use></svg>
                        Home
                    </a>
                </li>
                <li>
                    <a href="about.html">
                        <svg aria-hidden="true"><use href="icons.svg#icon-info"></use></svg>
                        About
                    </a>
                </li>
                <li>
                    <a href="contact.html" aria-current="page">
                        <svg aria-hidden="true"><use href="icons.svg#icon-megaphone"></use></svg>
                        Contact
                    </a>
                </li>
            </ul>
            <span>CSS Showcase</span>
            <ul>
                <li>
                    <a href="index.html">
                        <svg aria-hidden="true"><use href="icons.svg#icon-search"></use></svg>
                        Search
                    </a>
                </li>
                <li>
                    <button type="button" data-action="toggle-theme" aria-label="Toggle dark mode">
                        <svg aria-hidden="true" class="icon-sun"><use href="icons.svg#icon-sun"></use></svg>
                        <svg aria-hidden="true" class="icon-moon"><use href="icons.svg#icon-moon"></use></svg>
                    </button>
                </li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section>
            <h1>Contact</h1>
            <h2>Get in touch</h2>
            <form action="#">
                <label>Name <span>*</span>
                    <input type="text" name="name" placeholder="Your name">
                </label>

                <label>Email <span>*</span>
                    <input type="email" name="email" placeholder="Your email address">
                </label>

                <label>Message
                    <textarea name="message" rows="5" placeholder="How can we help?"></textarea>
                </label>

                <button type="submit">Send Message</button>
            </form>
        </section>

        <section>
            <h2>Other ways to reach us</h2>
            <address>
                123 Example Street<br>
                City, Country 12345<br>
                <a href="mailto:info@example.com">info@example.com</a>
            </address>
        </section>
    </main>

    <footer>
        <ul>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="index.html">Home</a></li>
        </ul>
        <p>Powered by: Minimal CSS</p>
    </footer>

    <script src="theme-toggle.js"></script>

</body>

</html>
